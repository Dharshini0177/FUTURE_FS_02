<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LeadFlow CRM</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f1f5f9;color:#1e293b;min-height:100vh}
.hidden{display:none!important}
/* Auth Pages */
.auth-wrapper{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#4f46e5 0%,#7c3aed 50%,#6366f1 100%);padding:20px}
.auth-card{background:#fff;border-radius:20px;padding:40px;width:100%;max-width:420px;box-shadow:0 25px 60px rgba(0,0,0,.2)}
.auth-card h1{font-size:26px;font-weight:700;margin-bottom:6px;color:#1e293b}
.auth-card p.sub{font-size:14px;color:#64748b;margin-bottom:28px}
.auth-card .logo{display:flex;align-items:center;gap:10px;margin-bottom:28px;font-size:22px;font-weight:700;color:#4f46e5}
.auth-card .logo span{background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff;width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px}
.form-group{margin-bottom:18px}
.form-group label{display:block;font-size:13px;font-weight:600;color:#475569;margin-bottom:6px}
.form-group input{width:100%;height:42px;border:1.5px solid #e2e8f0;border-radius:10px;padding:0 14px;font-size:14px;transition:border .2s;outline:none;background:#f8fafc}
.form-group input:focus{border-color:#4f46e5;background:#fff}
.btn-primary{width:100%;height:44px;border:none;border-radius:10px;background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff;font-size:14px;font-weight:600;cursor:pointer;transition:opacity .2s}
.btn-primary:hover{opacity:.9}
.auth-switch{text-align:center;margin-top:20px;font-size:13px;color:#64748b}
.auth-switch button{background:none;border:none;color:#4f46e5;font-weight:600;cursor:pointer;text-decoration:underline}
.msg{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px}
.msg-error{background:#fef2f2;color:#dc2626;border:1px solid #fecaca}
.msg-success{background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0}
/* Dashboard Layout */
.app{display:flex;min-height:100vh}
.sidebar{width:240px;background:#1e1b4b;color:#fff;padding:20px 0;display:flex;flex-direction:column;position:fixed;height:100vh;z-index:10}
.sidebar .logo{display:flex;align-items:center;gap:10px;padding:0 20px;margin-bottom:32px;font-size:18px;font-weight:700}
.sidebar .logo span{background:rgba(255,255,255,.15);width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px}
.sidebar nav a{display:flex;align-items:center;gap:12px;padding:11px 20px;font-size:14px;color:rgba(255,255,255,.65);text-decoration:none;transition:all .15s;cursor:pointer;border-left:3px solid transparent}
.sidebar nav a:hover,.sidebar nav a.active{background:rgba(255,255,255,.08);color:#fff;border-left-color:#818cf8}
.sidebar .logout{margin-top:auto;padding:0 20px}
.sidebar .logout button{width:100%;padding:10px;border:none;border-radius:10px;background:rgba(255,255,255,.08);color:rgba(255,255,255,.7);font-size:13px;cursor:pointer;transition:all .15s}
.sidebar .logout button:hover{background:rgba(255,255,255,.15);color:#fff}
.main{margin-left:240px;flex:1;padding:28px;background:#f1f5f9;min-height:100vh}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px}
.topbar h2{font-size:22px;font-weight:700}
.topbar .user{display:flex;align-items:center;gap:10px;font-size:13px;color:#64748b}
.topbar .user .avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:13px}
/* Stats */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:18px;margin-bottom:28px}
.stat-card{background:#fff;border-radius:16px;padding:22px;box-shadow:0 1px 3px rgba(0,0,0,.06);transition:transform .15s}
.stat-card:hover{transform:translateY(-2px)}
.stat-card .icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;margin-bottom:14px}
.stat-card .label{font-size:13px;color:#64748b;font-weight:500}
.stat-card .value{font-size:30px;font-weight:700;margin-top:4px}
.stat-card.total .icon{background:#eef2ff;color:#4f46e5}
.stat-card.new .icon{background:#fefce8;color:#ca8a04}
.stat-card.contacted .icon{background:#eff6ff;color:#2563eb}
.stat-card.converted .icon{background:#f0fdf4;color:#16a34a}
/* Table */
.card{background:#fff;border-radius:16px;padding:22px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.card h3{font-size:16px;font-weight:600;margin-bottom:18px}
.toolbar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.toolbar input{flex:1;min-width:200px;height:38px;border:1.5px solid #e2e8f0;border-radius:10px;padding:0 14px;font-size:13px;outline:none}
.toolbar input:focus{border-color:#4f46e5}
.toolbar select{height:38px;border:1.5px solid #e2e8f0;border-radius:10px;padding:0 12px;font-size:13px;outline:none;background:#fff;cursor:pointer}
.btn-add{height:38px;padding:0 18px;border:none;border-radius:10px;background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap}
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:#94a3b8;font-weight:600;padding:10px 12px;border-bottom:1px solid #f1f5f9}
td{padding:12px;font-size:13px;border-bottom:1px solid #f8fafc;vertical-align:middle}
tr:hover{background:#f8fafc}
.badge{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;display:inline-block}
.badge-new{background:#fef9c3;color:#a16207}
.badge-contacted{background:#dbeafe;color:#1d4ed8}
.badge-converted{background:#dcfce7;color:#15803d}
.actions button{border:none;background:none;cursor:pointer;font-size:12px;padding:4px 8px;border-radius:6px;margin-right:4px;transition:background .15s}
.actions .del{color:#ef4444}.actions .del:hover{background:#fef2f2}
.status-select{border:1px solid #e2e8f0;border-radius:8px;padding:4px 8px;font-size:12px;outline:none;cursor:pointer}
.empty{text-align:center;padding:50px 20px;color:#94a3b8}
.empty .icon{font-size:40px;margin-bottom:12px}
/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:50;backdrop-filter:blur(4px)}
.modal{background:#fff;border-radius:16px;padding:28px;width:90%;max-width:440px;box-shadow:0 20px 50px rgba(0,0,0,.15)}
.modal h3{font-size:18px;font-weight:700;margin-bottom:20px}
.modal .form-group{margin-bottom:14px}
.modal .btn-row{display:flex;gap:10px;margin-top:20px}
.modal .btn-cancel{flex:1;height:40px;border:1.5px solid #e2e8f0;border-radius:10px;background:#fff;font-size:13px;cursor:pointer;font-weight:500}
.modal .btn-save{flex:1;height:40px;border:none;border-radius:10px;background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff;font-size:13px;cursor:pointer;font-weight:600}
/* Toast */
.toast{position:fixed;top:20px;right:20px;background:#1e293b;color:#fff;padding:14px 20px;border-radius:12px;font-size:13px;z-index:100;animation:slideIn .3s;box-shadow:0 10px 30px rgba(0,0,0,.2)}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
/* Responsive */
@media(max-width:768px){
.sidebar{display:none}
.main{margin-left:0}
.stats{grid-template-columns:repeat(2,1fr)}
.mobile-header{display:flex!important;align-items:center;justify-content:space-between;margin-bottom:20px;padding:14px 18px;background:#1e1b4b;border-radius:14px;color:#fff}
.mobile-header .logo{display:flex;align-items:center;gap:8px;font-weight:700;font-size:16px}
.mobile-header button{background:rgba(255,255,255,.15);border:none;color:#fff;padding:8px 14px;border-radius:8px;font-size:12px;cursor:pointer}
}
.mobile-header{display:none}
</style>
</head>
<body>

<!-- Auth Page -->
<div id="authPage" class="auth-wrapper">
  <div class="auth-card">
    <div class="logo"><span>⚡</span> LeadFlow</div>
    <h1 id="authTitle">Welcome back</h1>
    <p class="sub" id="authSub">Sign in to your account to continue</p>
    <div id="authMsg"></div>
    <form id="authForm">
      <div class="form-group hidden" id="nameGroup">
        <label>Full Name</label>
        <input type="text" id="nameInput" placeholder="John Doe">
      </div>
      <div class="form-group">
        <label>Email address</label>
        <input type="email" id="emailInput" placeholder="admin@company.com" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="passInput" placeholder="••••••••" required minlength="6">
      </div>
      <button type="submit" class="btn-primary" id="authBtn">Sign In →</button>
    </form>
    <div class="auth-switch">
      <span id="switchText">Don't have an account?</span>
      <button id="switchBtn" onclick="toggleAuth()">Sign up</button>
    </div>
  </div>
</div>

<!-- App -->
<div id="appPage" class="app hidden">
  <aside class="sidebar">
    <div class="logo"><span>⚡</span> LeadFlow</div>
    <nav>
      <a class="active" onclick="showPage('dashboard')" id="navDash">📊 Dashboard</a>
      <a onclick="showPage('leads')" id="navLeads">👥 Leads</a>
    </nav>
    <div class="logout"><button onclick="doLogout()">🚪 Sign Out</button></div>
  </aside>
  <div class="main">
    <div class="mobile-header">
      <div class="logo">⚡ LeadFlow</div>
      <button onclick="doLogout()">Sign Out</button>
    </div>

    <!-- Dashboard -->
    <div id="dashboardPage">
      <div class="topbar">
        <div><h2>Dashboard</h2><p style="font-size:13px;color:#64748b;margin-top:2px">Overview of your lead pipeline</p></div>
        <div class="user"><div class="avatar" id="userAvatar">A</div><span id="userName">Admin</span></div>
      </div>
      <div class="stats" id="statsContainer"></div>
      <div class="card">
        <h3>Recent Leads</h3>
        <div id="recentLeads"></div>
      </div>
    </div>

    <!-- Leads -->
    <div id="leadsPage" class="hidden">
      <div class="topbar">
        <div><h2>Lead Management</h2><p style="font-size:13px;color:#64748b;margin-top:2px">View and manage all your leads</p></div>
        <div class="user"><div class="avatar" id="userAvatar2">A</div></div>
      </div>
      <div class="card">
        <div class="toolbar">
          <input type="text" placeholder="Search leads by name or email..." id="searchInput" oninput="renderLeads()">
          <select id="filterSelect" onchange="renderLeads()"><option value="all">All Statuses</option><option value="new">New</option><option value="contacted">Contacted</option><option value="converted">Converted</option></select>
          <button class="btn-add" onclick="openModal()">+ Add Lead</button>
        </div>
        <div id="leadsTable"></div>
      </div>
    </div>
  </div>
</div>

<!-- Add Lead Modal -->
<div id="modal" class="modal-overlay hidden">
  <div class="modal">
    <h3 id="modalTitle">Add New Lead</h3>
    <div class="form-group"><label>Name *</label><input type="text" id="leadName" placeholder="Full name"></div>
    <div class="form-group"><label>Email *</label><input type="email" id="leadEmail" placeholder="email@example.com"></div>
    <div class="form-group"><label>Phone</label><input type="text" id="leadPhone" placeholder="+1 555-0100"></div>
    <div class="form-group"><label>Company</label><input type="text" id="leadCompany" placeholder="Company name"></div>
    <div class="form-group"><label>Source</label>
      <select id="leadSource" style="width:100%;height:42px;border:1.5px solid #e2e8f0;border-radius:10px;padding:0 14px;font-size:14px;background:#f8fafc">
        <option>Website</option><option>Referral</option><option>LinkedIn</option><option>Cold Call</option><option>Other</option>
      </select>
    </div>
    <div class="btn-row">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveLead()">Save Lead</button>
    </div>
  </div>
</div>

<div id="toast" class="toast hidden"></div>

<script>
let isSignup = false;
let currentUser = null;
let leads = [];

// ── Auth ──
function toggleAuth() {
  isSignup = !isSignup;
  document.getElementById('authTitle').textContent = isSignup ? 'Create an account' : 'Welcome back';
  document.getElementById('authSub').textContent = isSignup ? 'Sign up to get started' : 'Sign in to your account to continue';
  document.getElementById('nameGroup').classList.toggle('hidden', !isSignup);
  document.getElementById('authBtn').textContent = isSignup ? 'Sign Up →' : 'Sign In →';
  document.getElementById('switchText').textContent = isSignup ? 'Already have an account?' : "Don't have an account?";
  document.getElementById('switchBtn').textContent = isSignup ? 'Sign in' : 'Sign up';
  document.getElementById('authMsg').innerHTML = '';
}

document.getElementById('authForm').addEventListener('submit', function(e) {
  e.preventDefault();
  const email = document.getElementById('emailInput').value.trim();
  const pass = document.getElementById('passInput').value;
  const name = document.getElementById('nameInput').value.trim();
  const users = JSON.parse(localStorage.getItem('crm_users') || '[]');

  if (isSignup) {
    if (users.find(u => u.email === email)) {
      showAuthMsg('Email already registered', 'error'); return;
    }
    users.push({ id: Date.now(), name: name || email.split('@')[0], email, password: pass });
    localStorage.setItem('crm_users', JSON.stringify(users));
    showAuthMsg('Account created! You can now sign in.', 'success');
    toggleAuth();
  } else {
    const user = users.find(u => u.email === email && u.password === pass);
    if (!user) { showAuthMsg('Invalid email or password', 'error'); return; }
    currentUser = user;
    localStorage.setItem('crm_session', JSON.stringify(user));
    initApp();
  }
});

function showAuthMsg(text, type) {
  document.getElementById('authMsg').innerHTML = `<div class="msg msg-${type}">${text}</div>`;
}

function doLogout() {
  localStorage.removeItem('crm_session');
  currentUser = null;
  document.getElementById('appPage').classList.add('hidden');
  document.getElementById('authPage').classList.remove('hidden');
  document.getElementById('emailInput').value = '';
  document.getElementById('passInput').value = '';
}

// ── App Init ──
function initApp() {
  document.getElementById('authPage').classList.add('hidden');
  document.getElementById('appPage').classList.remove('hidden');
  const initials = currentUser.name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0,2);
  document.getElementById('userAvatar').textContent = initials;
  document.getElementById('userAvatar2').textContent = initials;
  document.getElementById('userName').textContent = currentUser.name;
  loadLeads();
  showPage('dashboard');
}

// ── Leads ──
function loadLeads() {
  const key = 'crm_leads_' + currentUser.id;
  leads = JSON.parse(localStorage.getItem(key) || '[]');
  if (leads.length === 0) {
    leads = [
      { id: Date.now(), name: "John Doe", email: "john@gmail.com", phone: "+1 555-0101", company: "Acme Corp", source: "Website", status: "new", createdAt: new Date().toISOString() },
      { id: Date.now()+1, name: "Anu Sharma", email: "anu@gmail.com", phone: "+91 98765-43210", company: "TechStart", source: "Referral", status: "contacted", createdAt: new Date().toISOString() },
      { id: Date.now()+2, name: "Rahul Patel", email: "rahul@gmail.com", phone: "+91 91234-56789", company: "DataFlow Inc", source: "LinkedIn", status: "converted", createdAt: new Date().toISOString() },
      { id: Date.now()+3, name: "Sarah Chen", email: "sarah@company.com", phone: "+1 555-0202", company: "CloudNine", source: "Website", status: "new", createdAt: new Date().toISOString() },
      { id: Date.now()+4, name: "Mike Johnson", email: "mike@startup.io", phone: "+1 555-0303", company: "GrowthLab", source: "Cold Call", status: "contacted", createdAt: new Date().toISOString() },
    ];
    saveLeads();
  }
}

function saveLeads() {
  localStorage.setItem('crm_leads_' + currentUser.id, JSON.stringify(leads));
}

function renderStats() {
  const total = leads.length;
  const nw = leads.filter(l => l.status === 'new').length;
  const ct = leads.filter(l => l.status === 'contacted').length;
  const cv = leads.filter(l => l.status === 'converted').length;
  document.getElementById('statsContainer').innerHTML = `
    <div class="stat-card total"><div class="icon">👥</div><div class="label">Total Leads</div><div class="value">${total}</div></div>
    <div class="stat-card new"><div class="icon">🆕</div><div class="label">New Leads</div><div class="value">${nw}</div></div>
    <div class="stat-card contacted"><div class="icon">📞</div><div class="label">Contacted</div><div class="value">${ct}</div></div>
    <div class="stat-card converted"><div class="icon">✅</div><div class="label">Converted</div><div class="value">${cv}</div></div>`;
}

function renderRecent() {
  const recent = [...leads].sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt)).slice(0,5);
  if (!recent.length) { document.getElementById('recentLeads').innerHTML = '<div class="empty"><div class="icon">📭</div><p>No leads yet</p></div>'; return; }
  document.getElementById('recentLeads').innerHTML = recent.map(l => `
    <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid #f1f5f9">
      <div style="display:flex;align-items:center;gap:12px">
        <div style="width:36px;height:36px;border-radius:50%;background:#f1f5f9;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#64748b">${l.name.split(' ').map(n=>n[0]).join('')}</div>
        <div><div style="font-size:13px;font-weight:500">${l.name}</div><div style="font-size:11px;color:#94a3b8">${l.company||l.email}</div></div>
      </div>
      <span class="badge badge-${l.status}">${l.status}</span>
    </div>`).join('');
}

function renderLeads() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const filter = document.getElementById('filterSelect').value;
  const filtered = leads.filter(l => {
    const matchSearch = !search || l.name.toLowerCase().includes(search) || l.email.toLowerCase().includes(search);
    const matchFilter = filter === 'all' || l.status === filter;
    return matchSearch && matchFilter;
  });
  if (!filtered.length) {
    document.getElementById('leadsTable').innerHTML = '<div class="empty"><div class="icon">📭</div><p>No leads found</p><p style="font-size:12px;margin-top:4px">Try adjusting your search or filters</p></div>';
    return;
  }
  document.getElementById('leadsTable').innerHTML = `<table><thead><tr><th>Name</th><th>Email</th><th>Source</th><th>Status</th><th>Actions</th></tr></thead><tbody>${filtered.map(l => `
    <tr>
      <td><div style="display:flex;align-items:center;gap:10px"><div style="width:32px;height:32px;border-radius:50%;background:#f1f5f9;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#64748b">${l.name.split(' ').map(n=>n[0]).join('')}</div>${l.name}</div></td>
      <td style="color:#64748b">${l.email}</td>
      <td><span style="background:#f1f5f9;padding:3px 10px;border-radius:6px;font-size:12px">${l.source}</span></td>
      <td><select class="status-select" onchange="updateStatus(${l.id},this.value)"><option value="new"${l.status==='new'?' selected':''}>New</option><option value="contacted"${l.status==='contacted'?' selected':''}>Contacted</option><option value="converted"${l.status==='converted'?' selected':''}>Converted</option></select></td>
      <td class="actions"><button class="del" onclick="deleteLead(${l.id})">🗑 Delete</button></td>
    </tr>`).join('')}</tbody></table>`;
}

function updateStatus(id, status) {
  const lead = leads.find(l => l.id === id);
  if (lead) { lead.status = status; saveLeads(); renderStats(); renderRecent(); showToast('Status updated'); }
}

function deleteLead(id) {
  leads = leads.filter(l => l.id !== id);
  saveLeads(); renderLeads(); renderStats(); renderRecent();
  showToast('Lead deleted');
}

// ── Modal ──
function openModal() { document.getElementById('modal').classList.remove('hidden'); }
function closeModal() { document.getElementById('modal').classList.add('hidden'); document.getElementById('leadName').value=''; document.getElementById('leadEmail').value=''; document.getElementById('leadPhone').value=''; document.getElementById('leadCompany').value=''; }

function saveLead() {
  const name = document.getElementById('leadName').value.trim();
  const email = document.getElementById('leadEmail').value.trim();
  if (!name || !email) { showToast('Name and email are required'); return; }
  leads.push({
    id: Date.now(),
    name, email,
    phone: document.getElementById('leadPhone').value.trim(),
    company: document.getElementById('leadCompany').value.trim(),
    source: document.getElementById('leadSource').value,
    status: 'new',
    createdAt: new Date().toISOString()
  });
  saveLeads(); renderLeads(); renderStats(); renderRecent(); closeModal();
  showToast('Lead added successfully');
}

// ── Navigation ──
function showPage(page) {
  document.getElementById('dashboardPage').classList.toggle('hidden', page !== 'dashboard');
  document.getElementById('leadsPage').classList.toggle('hidden', page !== 'leads');
  document.getElementById('navDash').classList.toggle('active', page === 'dashboard');
  document.getElementById('navLeads').classList.toggle('active', page === 'leads');
  if (page === 'dashboard') { renderStats(); renderRecent(); }
  if (page === 'leads') { renderLeads(); }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.remove('hidden');
  setTimeout(() => t.classList.add('hidden'), 2500);
}

// ── Auto-login ──
(function() {
  const s = localStorage.getItem('crm_session');
  if (s) { currentUser = JSON.parse(s); initApp(); }
})();
</script>
</body>
</html>
